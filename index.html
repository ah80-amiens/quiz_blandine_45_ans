<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Tu te mets combien en Blandine</title>
<style>
body {
  font-family: Calibri;
  font-size: 26px;
  background: radial-gradient(circle at top, #dff4f9, #a5e0ee);
  color: white;
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 95%;
  max-width: 1000px;
  background: linear-gradient(145deg, #28b1d2, #dff4f9);
  border-radius: 18px;
  padding: 18px;
  box-shadow: 0 0 25px rgba(233,244,249,0.15);
  border: 1px solid rgba(233,244,249,0.2);
  text-align: center;
}

h2, h3 {
  color: #12505e;
  margin-top: 10px;
  font-family: Calibri;
}

input {
  width: 90%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
  font-size: 20px;
  text-align: center;
}

button {
  margin: 6px 0;
  padding: 14px;
  width: 95%;
  border-radius: 12px;
  border: 1px solid rgba(233,244,249,0.3);
  cursor: pointer;
  background: linear-gradient(145deg, #166072, #2692ac);

  font-size: 18px;
  transition: 0.2s;
  touch-action: manipulation; /* ✅ mobile */
}

button:active {
  transform: scale(0.98);
}

.correct { background: #1f8f3a !important; }
.wrong { background: #b91c1c !important; }
.hidden { display: none; }

/* TIMER */
#timerBar {
  height: 10px;
  width: 100%;
  background: rgba(233,244,249,0.3);
  border-radius: 10px;
  overflow: hidden;
  margin-top: 10px;
}

#timerFill {
  height: 100%;
  width: 100%;
  background: gold;
  transition: width 1s linear;
}

.table {
  width: 100%;
  border-collapse: collapse;
  color: white;
  font-size: 18px;
}

td, th {
  border: 1px solid rgba(233,244,249,0.3);
  padding: 6px;
}

/* 🎯 THEME GRID */
#themeButtons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 10px;
}

/* réponses */
#answers {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* MOBILE OPTIMIZATION */
@media (max-width: 600px) {

  body {
    font-size: 18px;
    align-items: flex-start;
    font-family: Calibri;
  }
  .container {
    border-radius: 0;
    min-height: 100vh;
    max-width: 100%;
    padding: 15px;
  }

  h2 { font-size: 30px; }
  h3 { font-size: 25px; }

  input {
    font-size: 18px;
    padding: 14px;			  
  }

  button {
    font-size: 18px;
    padding: 16px;
  }

  /* mobile -> 2 colonnes */
  #themeButtons {
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }

    display: block;
    overflow-x: auto;

<body>

<!-- START -->

  <input id="pseudo" placeholder="Indique ton nom d'équipe ici">
  <button onclick="start()">Commencer</button>
  <button onclick="showLeaderboard()">🏆 Classement</button>
</div>

<!-- THEMES -->
<div class="container hidden" id="themes">
  <h3>📚 CHOISIS UN THEME</h3>
  <div id="themeButtons"></div>
  <p id="score">Score : 0</p>
  <h5>N'hésites pas, tu devras répondre à chacun des thèmes 😉</h5>
  <h2>🚫 Interdiction de tricher via recherche internet... 🚫</h2>

</div>

<!-- QUESTIONS -->
<div class="container hidden" id="questions">
  <h3>🎯 CHOISIS UNE QUESTION</h3>
  <div id="questionButtons"></div>
</div>

<!-- QUIZ -->
<div class="container hidden" id="quiz">
  <h3 id="question"></h3>
  <div id="answers"></div>
  <p id="timerText">⏱ Temps restant : 10</p>
  <div id="timerBar"><div id="timerFill"></div></div>
</div>

<!-- LEADERBOARD -->
<div class="container hidden" id="leaderboardScreen">

  <button onclick="exportCSV()">📥 Export Excel</button>
  <button onclick="resetScores()">🗑 Reset scores</button>
  <button onclick="backToMenu()">Retour</button>

  <table class="table">
    <thead><tr><th>Equipe</th><th>Score</th></tr></thead>
    <tbody id="leaderboard"></tbody>
  </table>
</div>

function start() {
  player = document.getElementById("pseudo").value.trim();
  if (!player) return alert("Entre un nom d'équipe");

  let scores = JSON.parse(localStorage.getItem("scores")) || [];

  if (scores.find(s => s.player.toLowerCase() === player.toLowerCase())) {
    return alert("Nom déjà utilisé ! Choisis-en un autre.");
  }

  themes = Object.keys(data);

  document.getElementById("start").classList.add("hidden");
  document.getElementById("themes").classList.remove("hidden");

  showThemes();
}

function showThemes() {
  const div = document.getElementById("themeButtons");
  div.innerHTML = "";

  themes.forEach(t => {
    const b = document.createElement("button");
    b.textContent = t;
    b.onclick = () => selectTheme(t);
    div.appendChild(b);
  });
}

function selectTheme(theme) {
  currentTheme = theme;
  document.getElementById("themes").classList.add("hidden");
  document.getElementById("questions").classList.remove("hidden");
  showQuestions();
}

function showQuestions() {
  const div = document.getElementById("questionButtons");
  div.innerHTML = "";

  data[currentTheme].forEach((q, i) => {
    const b = document.createElement("button");
    b.textContent = "Question à " + q.pts + " pts";
    b.onclick = () => loadQuestion(i);
    div.appendChild(b);
  });
}

function loadQuestion(i) {
  const q = data[currentTheme][i];

  document.getElementById("questions").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");

  document.getElementById("question").textContent = q.q + " (" + q.pts + " pts)";

  const div = document.getElementById("answers");
  div.innerHTML = "";

  q.a.forEach((a, idx) => {
    const b = document.createElement("button");
    b.textContent = a;
    b.onclick = () => answer(i, idx, b);
    div.appendChild(b);
  });

  startTimer();
}

function startTimer() {
  clearInterval(timer);
  timeLeft = 30;
  updateTimer();

  timer = setInterval(() => {
    timeLeft--;
    updateTimer();

    if (timeLeft <= 0) {
      clearInterval(timer);
      nextStep();
    }
  }, 1000);
}

function updateTimer() {
  document.getElementById("timerText").textContent = "⏱ Temps : " + timeLeft;
  document.getElementById("timerFill").style.width = (timeLeft / 30 * 100) + "%";
}

function answer(i, idx, btn) {
  clearInterval(timer);
  const q = data[currentTheme][i];

  if (idx === q.c) {
    score += q.pts;
    btn.classList.add("correct");
  } else {
    btn.classList.add("wrong");
  }

  setTimeout(nextStep, 700);
}

function nextStep() {
  themes = themes.filter(t => t !== currentTheme);

  document.getElementById("quiz").classList.add("hidden");

  if (themes.length > 0) {
    document.getElementById("themes").classList.remove("hidden");
    showThemes();
  } else {
    saveScore();
    alert(player + " termine avec " + score + " points !");
    location.reload();
  }

  document.getElementById("score").textContent = "Score : " + score;
}

function saveScore() {
  let s = JSON.parse(localStorage.getItem("scores")) || [];
  s.push({ player, score });
  localStorage.setItem("scores", JSON.stringify(s));
}

function showLeaderboard() {
  document.getElementById("start").classList.add("hidden");
  document.getElementById("leaderboardScreen").classList.remove("hidden");
  displayLeaderboard();
}

function backToMenu() {
  location.reload();
}

function displayLeaderboard() {
  let s = JSON.parse(localStorage.getItem("scores")) || [];
  s.sort((a,b) => b.score - a.score);

  const board = document.getElementById("leaderboard");
  board.innerHTML = "";

  const medals = ["🥇","🥈","🥉"];
  let podium = "<h3>Podium</h3>";

  s.slice(0,3).forEach((p,i) => {
    podium += `<p>${medals[i]} ${p.player} - ${p.score}</p>`;
  });

  document.getElementById("podium").innerHTML = podium;

  s.slice(0,10).forEach(p => {
    board.innerHTML += `<tr><td>${p.player}</td><td>${p.score}</td></tr>`;
  });
}

function exportCSV() {
  let s = JSON.parse(localStorage.getItem("scores")) || [];
  let csv = "Pseudo,Score\n";

  s.forEach(p => csv += `${p.player},${p.score}\n`);

  const blob = new Blob([csv], {type:"text/csv"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "classement.csv";
  a.click();
}

function resetScores() {
  const pass = prompt("Mot de passe admin ?");
  if (pass !== ADMIN_PASS) return alert("Accès refusé");

  localStorage.removeItem("scores");
  alert("Scores supprimés !");
  location.reload();
}

</script>

</html>
