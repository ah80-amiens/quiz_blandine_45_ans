function start() {
  player = document.getElementById("pseudo").value.trim();
  if (!player) return alert("Entre un nom d'équipe");
  themes = Object.keys(data);
  document.getElementById("start").classList.add("hidden");
  document.getElementById("themes").classList.remove("hidden");
  showThemes();
}

function showThemes() {
  const div = document.getElementById("themeButtons");
  div.innerHTML = "";
  themes.forEach(t => {
    const b = document.createElement("button");
    b.textContent = t;
    b.onclick = () => selectTheme(t);
    div.appendChild(b);
  });
}

function selectTheme(theme) {
  currentTheme = theme;
  document.getElementById("themes").classList.add("hidden");
  document.getElementById("questions").classList.remove("hidden");
  showQuestions();
}

function showQuestions() {
  const div = document.getElementById("questionButtons");
  div.innerHTML = "";
  data[currentTheme].forEach((q, i) => {
    const b = document.createElement("button");
    b.textContent = "Question à " + q.pts + " pts";
    b.onclick = () => loadQuestion(i);
    div.appendChild(b);
  });
}

function loadQuestion(i) {
  const q = data[currentTheme][i];
  document.getElementById("questions").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  document.getElementById("question").textContent = q.q + " (" + q.pts + " pts)";
  const div = document.getElementById("answers");
  div.innerHTML = "";
  q.a.forEach((a, idx) => {
    const b = document.createElement("button");
    b.textContent = a;
    b.onclick = () => answer(i, idx, b);
    div.appendChild(b);
  });
  startTimer();
}

function startTimer() {
  clearInterval(timer);
  timeLeft = 30;
  updateTimer();
  timer = setInterval(() => {
    timeLeft--;
    updateTimer();
    if (timeLeft <= 0) {
      clearInterval(timer);
      nextStep();
    }
  }, 1000);
}

function updateTimer() {
  document.getElementById("timerText").textContent = "⏱ Temps : " + timeLeft;
  document.getElementById("timerFill").style.width = (timeLeft / 30 * 100) + "%";
}

function answer(i, idx, btn) {
  clearInterval(timer);
  const q = data[currentTheme][i];
  if (idx === q.c) {
    score += q.pts;
    btn.classList.add("correct");
  } else {
    btn.classList.add("wrong");
  }
  setTimeout(nextStep, 700);
}

async function nextStep() {
  themes = themes.filter(t => t !== currentTheme);
  document.getElementById("quiz").classList.add("hidden");
  if (themes.length > 0) {
    document.getElementById("themes").classList.remove("hidden");
    showThemes();
  } else {
    try {
      await saveScore(); // ✅ attendre la fin de l'écriture avant de recharger
      alert(player + " termine avec " + score + " points !");
      location.reload();
    } catch (e) {
      console.error(e);
      alert("Erreur : score non sauvegardé. Vérifie la connexion / API.");
    }
    return;
  }
  document.getElementById("score").textContent = "Score : " + score;
}

// Sauvegarde en ligne
async function saveScore() {
  const scores = await getScores();
  if (scores.find(s => s.player.toLowerCase() === player.toLowerCase())) {
    alert("Nom déjà utilisé !");
    return;
  }
  const res = await fetch(API_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({data: [{ player, score }]})
  });
  // Optionnel mais utile : remonte une erreur si l'API refuse l'écriture
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`POST failed: ${res.status} ${txt}`);
  }
}

async function getScores() {
  const res = await fetch(API_URL);
  const data = await res.json();
  return data.map(e => ({player: e.player, score: parseInt(e.score)}));
}

function showLeaderboard() {
  document.getElementById("start").classList.add("hidden");
  document.getElementById("leaderboardScreen").classList.remove("hidden");
  displayLeaderboard();
  liveUpdate();
}

function backToMenu() {
  location.reload();
}

async function displayLeaderboard() {
  let s = await getScores();
  const hash = JSON.stringify(s);
  if (hash === lastDataHash) return;
  lastDataHash = hash;

  s.sort((a,b) => b.score - a.score);
  const board = document.getElementById("leaderboard");
  board.innerHTML = "";

  const medals = ["🥇","🥈","🥉"];
  let podium = "<h3>Podium</h3>";

  s.slice(0,3).forEach((p,i) => {
    podium += `<p class="podium-item">${medals[i]} ${p.player} : ${p.score} pts</p>`;
  });

  document.getElementById("podium").innerHTML = podium;

  s.slice(0,10).forEach(p => {
    board.innerHTML += `<tr><td>${p.player}</td><td>${p.score}</td></tr>`;
  });
}

function exportCSV() {
  alert("Export désactivé (Google Sheet fait office de source)");
}

function resetScores() {
  alert("Reset désactivé (géré via Google Sheet)");
}

// live update
async function liveUpdate() {
  while (true) {
    await displayLeaderboard();
    await new Promise(r => setTimeout(r, 1000));
  }
}

</script>
